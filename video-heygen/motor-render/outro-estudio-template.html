<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
  @font-face {
    font-family: 'Space Grotesk'; font-weight: 700;
    src: url(data:font/woff2;base64,__GROTESK700__) format('woff2');
  }
  @font-face {
    font-family: 'JetBrains Mono'; font-weight: 500;
    src: url(data:font/woff2;base64,__JETMONO500__) format('woff2');
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 1080px; height: 1920px; background: #09090a; overflow: hidden; }
  #stage {
    position: relative; width: 1080px; height: 1920px;
    background: radial-gradient(ellipse 120% 90% at 50% 46%, #101218 0%, #09090a 62%);
    transform-origin: 50% 46%;
    will-change: transform;
  }
  #glow {
    position: absolute; left: 50%; top: 46%;
    width: 1600px; height: 1600px;
    transform: translate(-50%,-50%) scale(0.4);
    background: radial-gradient(circle,
      rgba(91,156,246,0.22) 0%,
      rgba(56,189,248,0.10) 32%,
      rgba(168,85,247,0.05) 54%,
      rgba(91,156,246,0) 70%);
    opacity: 0; will-change: transform, opacity;
  }
  .particle {
    position: absolute; border-radius: 50%;
    background: #5b9cf6; opacity: 0; will-change: transform, opacity;
  }
  #titulo {
    position: absolute; left: 0; right: 0; top: 20.5%;
    text-align: center;
    font-family: 'Space Grotesk', sans-serif; font-weight: 700;
    font-size: 74px; line-height: 1.16; letter-spacing: -1px;
    color: #f0ede8;
  }
  #titulo .l { display: block; opacity: 0; transform: translateY(34px); will-change: opacity, transform; }
  #titulo .em { color: #5b9cf6; }
  #btnWrap {
    position: absolute; left: 50%; top: 34.5%;
    transform: translate(-50%, 0) scale(0.6);
    opacity: 0; will-change: transform, opacity;
  }
  #btn {
    position: relative; overflow: hidden;
    font-family: 'Space Grotesk', sans-serif; font-weight: 700;
    font-size: 44px; letter-spacing: 0.06em;
    color: #0d1526;
    background: linear-gradient(180deg, #9cc4fb 0%, #5b9cf6 55%, #3f7fe0 100%);
    padding: 34px 76px; border-radius: 999px;
    box-shadow: 0 0 70px rgba(91,156,246,0.45), 0 10px 40px rgba(0,0,0,0.5);
    white-space: nowrap;
  }
  #btnShine {
    position: absolute; top: -30%; left: 0;
    width: 30%; height: 160%;
    background: linear-gradient(105deg,
      rgba(255,255,255,0) 0%, rgba(255,255,255,0.55) 50%, rgba(255,255,255,0) 100%);
    transform: translateX(-300%);
    will-change: transform;
  }
  #web {
    position: absolute; left: 0; right: 0; top: 44%;
    text-align: center;
    font-family: 'JetBrains Mono', monospace; font-weight: 500;
    font-size: 40px; letter-spacing: 0.06em;
    color: #8ab4f4;
    opacity: 0; transform: translateY(20px);
    will-change: opacity, transform;
  }
  #web .blip {
    display: inline-block; width: 18px; height: 18px; border-radius: 50%;
    background: #3ecf8e; margin-right: 18px; vertical-align: middle;
    box-shadow: 0 0 18px rgba(62,207,142,0.8);
    transform: scale(0);
    will-change: transform;
  }
  #logoWrap {
    position: absolute; left: 50%; top: 55.5%;
    width: 500px; height: 500px;
    transform: translate(-50%, 0) scale(0.7);
    opacity: 0;
    filter: drop-shadow(0 0 80px rgba(91,156,246,0.32));
    will-change: transform, opacity;
  }
  #logoCanvas { width: 100%; height: 100%; display: block; }
  #redes {
    position: absolute; left: 0; right: 0; top: 86.5%;
    text-align: center;
  }
  #redes .icon {
    display: inline-block; margin: 0 26px;
    opacity: 0; transform: translateY(18px) scale(0.8);
    will-change: opacity, transform;
  }
  #redes svg { width: 72px; height: 72px; }
  .pulse {
    position: absolute; left: 50%; top: 55.5%;
    width: 500px; height: 500px;
    margin-top: 250px;
    border: 3px solid #3ecf8e; border-radius: 50%;
    transform: translate(-50%,-50%) scale(0.95);
    opacity: 0; will-change: transform, opacity;
  }
</style>
</head>
<body>
<div id="stage">
  <div id="glow"></div>
  <div id="particles"></div>
  <div id="titulo">
    <span class="l" id="lin1">Seguinos para</span>
    <span class="l" id="lin2">m&aacute;s <span class="em">IA simple</span>.</span>
  </div>
  <div id="btnWrap"><div id="btn">CONOC&Eacute; EL ESTUDIO<div id="btnShine"></div></div></div>
  <div id="web"><span class="blip" id="blip"></span>oficinadejhonson.com</div>
  <div class="pulse" id="pulse1"></div>
  <div id="logoWrap"><canvas id="logoCanvas" width="1400" height="1400"></canvas></div>
  <div id="redes">
    <span class="icon" id="ic1">
      <svg viewBox="0 0 48 48" fill="none" stroke="#8ab4f4" stroke-width="3">
        <rect x="6" y="6" width="36" height="36" rx="10"/>
        <circle cx="24" cy="24" r="9"/>
        <circle cx="35" cy="13" r="2.6" fill="#8ab4f4" stroke="none"/>
      </svg>
    </span>
    <span class="icon" id="ic2">
      <svg viewBox="0 0 48 48" fill="none" stroke="#8ab4f4" stroke-width="3.4">
        <path d="M9 9 L39 39 M39 9 L9 39"/>
      </svg>
    </span>
    <span class="icon" id="ic3">
      <svg viewBox="0 0 48 48">
        <rect x="6" y="6" width="36" height="36" rx="10" fill="none" stroke="#8ab4f4" stroke-width="3"/>
        <text x="24" y="33" text-anchor="middle"
          font-family="Arial, sans-serif" font-weight="bold" font-size="22" fill="#8ab4f4">in</text>
      </svg>
    </span>
  </div>
</div>
<script>
  const outExpo  = x => x >= 1 ? 1 : 1 - Math.pow(2, -10 * x);
  const outCubic = x => 1 - Math.pow(1 - x, 3);
  const inOutCubic = x => x < 0.5 ? 4*x*x*x : 1 - Math.pow(-2*x + 2, 3) / 2;
  const outBack  = x => { const c1 = 1.4, c3 = c1 + 1; return 1 + c3*Math.pow(x-1,3) + c1*Math.pow(x-1,2); };
  const clamp01 = x => Math.max(0, Math.min(1, x));
  const seg = (t, a, b) => clamp01((t - a) / (b - a));
  const $ = id => document.getElementById(id);

  function mulberry32(a) {
    return function() {
      let t = a += 0x6D2B79F5;
      t = Math.imul(t ^ t >>> 15, t | 1);
      t ^= t + Math.imul(t ^ t >>> 7, t | 61);
      return ((t ^ t >>> 14) >>> 0) / 4294967296;
    };
  }
  const rng = mulberry32(7);
  const ambient = [];
  const pContainer = $('particles');
  for (let i = 0; i < 20; i++) {
    const el = document.createElement('div');
    el.className = 'particle';
    const size = 3 + rng() * 6;
    el.style.width = size + 'px'; el.style.height = size + 'px';
    pContainer.appendChild(el);
    ambient.push({
      el,
      x: 60 + rng() * 960,
      y: 400 + rng() * 1400,
      speed: 24 + rng() * 46,
      sway: 16 + rng() * 30,
      phase: rng() * Math.PI * 2,
      op: 0.10 + rng() * 0.22,
      blur: rng() > 0.6,
    });
  }
  ambient.forEach(p => { if (p.blur) p.el.style.filter = 'blur(2px)'; });

  // chroma-key de fondo NEGRO (logo Estudio) + auto-centrado
  window.logoReady = (async function() {
    const img = new Image();
    img.src = 'data:image/jpeg;base64,__LOGO_ESTUDIO__';
    await img.decode();
    const W = img.naturalWidth, H = img.naturalHeight;
    const c = document.createElement('canvas');
    c.width = W; c.height = H;
    const ctx = c.getContext('2d');
    ctx.drawImage(img, 0, 0);
    const d = ctx.getImageData(0, 0, W, H);
    const px = d.data;
    const isBg = (i) => {
      const r = px[i], g = px[i+1], b = px[i+2];
      const mx = Math.max(r,g,b), mn = Math.min(r,g,b);
      return mx < 38 && (mx - mn) < 28;
    };
    const visited = new Uint8Array(W * H);
    const stack = [];
    for (let x = 0; x < W; x++) { stack.push(x, 0, x, H-1); }
    for (let y = 0; y < H; y++) { stack.push(0, y, W-1, y); }
    while (stack.length) {
      const y = stack.pop(), x = stack.pop();
      if (x < 0 || y < 0 || x >= W || y >= H) continue;
      const idx = y * W + x;
      if (visited[idx]) continue;
      visited[idx] = 1;
      const i4 = idx * 4;
      if (!isBg(i4)) continue;
      px[i4 + 3] = 0;
      stack.push(x+1, y, x-1, y, x, y+1, x, y-1);
    }
    ctx.putImageData(d, 0, 0);
    let minX = W, minY = H, maxX = 0, maxY = 0;
    for (let y = 0; y < H; y += 2) {
      for (let x = 0; x < W; x += 2) {
        if (px[(y * W + x) * 4 + 3] > 10) {
          if (x < minX) minX = x; if (x > maxX) maxX = x;
          if (y < minY) minY = y; if (y > maxY) maxY = y;
        }
      }
    }
    const bw = maxX - minX + 1, bh = maxY - minY + 1;
    const side = Math.max(bw, bh);
    const out = $('logoCanvas');
    const octx = out.getContext('2d');
    out.width = 1400; out.height = 1400;
    const scale = 1360 / side;
    octx.clearRect(0, 0, 1400, 1400);
    octx.drawImage(c, minX, minY, bw, bh,
      (1400 - bw * scale) / 2, (1400 - bh * scale) / 2, bw * scale, bh * scale);
    return true;
  })();

  // t en segundos [0, 6]
  window.seek = function(t) {
    $('stage').style.transform = `scale(${1 + 0.04 * (t / 6)})`;

    {
      const g = outCubic(seg(t, 0.0, 0.8));
      const breathe = 1 + (t > 0.8 ? 0.03 * Math.sin((t - 0.8) * 1.1 * Math.PI) : 0);
      $('glow').style.opacity = (0.62 * g).toFixed(4);
      $('glow').style.transform = `translate(-50%,-50%) scale(${(0.42 + 0.72 * g) * breathe})`;
    }
    ambient.forEach(p => {
      const y = p.y - p.speed * t;
      const x = p.x + Math.sin(t * 0.9 + p.phase) * p.sway;
      const env = seg(t, 0.2, 1.0) * (1 - seg(t, 5.5, 6.0));
      p.el.style.transform = `translate(${x}px, ${y}px)`;
      p.el.style.opacity = (p.op * env * (0.75 + 0.25 * Math.sin(t * 2.1 + p.phase * 3))).toFixed(3);
    });
    {
      const p1 = outCubic(seg(t, 0.25, 0.75));
      $('lin1').style.opacity = p1.toFixed(4);
      $('lin1').style.transform = `translateY(${34 * (1 - p1)}px)`;
      const p2 = outCubic(seg(t, 0.45, 0.95));
      $('lin2').style.opacity = p2.toFixed(4);
      $('lin2').style.transform = `translateY(${34 * (1 - p2)}px)`;
    }
    {
      const p = seg(t, 0.90, 1.50);
      const beat = t > 2.8 ? 0.018 * Math.sin((t - 2.8) * 1.3 * Math.PI) : 0;
      const s = 0.6 + 0.4 * outBack(p) + beat;
      $('btnWrap').style.opacity = clamp01(p * 3).toFixed(4);
      $('btnWrap').style.transform = `translate(-50%,0) scale(${s})`;
      const sh = seg(t, 1.80, 2.60);
      $('btnShine').style.transform = `translateX(${-300 + 700 * inOutCubic(sh)}%)`;
    }
    {
      const p = outCubic(seg(t, 1.30, 1.90));
      $('web').style.opacity = (0.95 * p).toFixed(4);
      $('web').style.transform = `translateY(${20 * (1 - p)}px)`;
      const b = seg(t, 1.55, 1.95);
      const pulse = t > 2 ? 1 + 0.18 * Math.sin((t - 2) * 2.2 * Math.PI) : 1;
      $('blip').style.transform = `scale(${(b === 0 ? 0 : outBack(b)) * pulse})`;
    }
    {
      const p = seg(t, 1.70, 2.40);
      const drift = t > 2.4 ? 0.012 * ((t - 2.4) / 3.6) : 0;
      $('logoWrap').style.opacity = clamp01(p * 2.5).toFixed(4);
      $('logoWrap').style.transform = `translate(-50%,0) scale(${0.7 + 0.3 * outExpo(p) + drift})`;
    }
    {
      const p = seg(t, 2.50, 3.30);
      $('pulse1').style.opacity = p === 0 ? 0 : (0.35 * (1 - p)).toFixed(4);
      $('pulse1').style.transform = `translate(-50%,-50%) scale(${0.97 + 0.5 * outCubic(p)})`;
    }
    {
      ['ic1','ic2','ic3'].forEach((id, i) => {
        const p = outCubic(seg(t, 2.60 + i * 0.20, 3.05 + i * 0.20));
        $(id).style.opacity = (0.92 * p).toFixed(4);
        $(id).style.transform = `translateY(${18 * (1 - p)}px) scale(${0.8 + 0.2 * p})`;
      });
    }
  };
  window.seek(0);
</script>
</body>
</html>
