<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none" role="img" aria-label="Equipo Agéntico">
  <defs>
    <linearGradient id="eqg" x1="14" y1="14" x2="50" y2="52" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#f5e2a0"/><stop offset="1" stop-color="#b89a4a"/>
    </linearGradient>
  </defs>
  <!-- conexiones del orquestador a los 4 agentes -->
  <g stroke="#ecd175" stroke-opacity=".45" stroke-width="1.6">
    <line x1="32" y1="32" x2="16" y2="16"/><line x1="32" y1="32" x2="48" y2="16"/>
    <line x1="32" y1="32" x2="16" y2="48"/><line x1="32" y1="32" x2="48" y2="48"/>
  </g>
  <!-- 4 agentes -->
  <g fill="#ecd175">
    <circle cx="16" cy="16" r="5"/><circle cx="48" cy="16" r="5"/>
    <circle cx="16" cy="48" r="5"/><circle cx="48" cy="48" r="5"/>
  </g>
  <!-- orquestador central -->
  <circle cx="32" cy="32" r="8.5" fill="url(#eqg)"/>
  <circle cx="32" cy="32" r="8.5" fill="none" stroke="#09090a" stroke-width="1.5"/>
</svg>
