<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none" role="img" aria-label="SONAR">
  <defs>
    <linearGradient id="sonarSweep" x1="32" y1="32" x2="56" y2="9" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#ecd175" stop-opacity=".85"/>
      <stop offset="1" stop-color="#ecd175" stop-opacity="0"/>
    </linearGradient>
  </defs>
  <!-- radar rings -->
  <circle cx="32" cy="32" r="27" stroke="#b89a4a" stroke-width="2" opacity=".35"/>
  <circle cx="32" cy="32" r="18.5" stroke="#b89a4a" stroke-width="2" opacity=".55"/>
  <circle cx="32" cy="32" r="10" stroke="#b89a4a" stroke-width="2" opacity=".8"/>
  <!-- sweep wedge -->
