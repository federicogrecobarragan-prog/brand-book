<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none" role="img" aria-label="ATRIA">
  <defs>
    <linearGradient id="atriaShaft" x1="32" y1="6" x2="32" y2="34" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#ecd175" stop-opacity=".9"/>
      <stop offset="1" stop-color="#ecd175" stop-opacity="0"/>
    </linearGradient>
  </defs>
  <!-- atrio: muros concentricos (arquitectura) -->
  <rect x="6" y="6" width="52" height="52" rx="9" stroke="#b89a4a" stroke-width="2" opacity=".35"/>
  <rect x="15" y="15" width="34" height="34" rx="6" stroke="#b89a4a" stroke-width="2" opacity=".6"/>
  <!-- compluvium: abertura del techo + haz de luz cenital -->
  <path d="M24 14 L40 14 L36 30 L28 30 Z" fill="url(#atriaShaft)"/>
  <line x1="24" y1="14" x2="40" y2="14" stroke="#ecd175" stroke-width="2.6" stroke-linecap="round"/>
  <!-- impluvium: lead calificado en el centro -->
  <circle cx="32" cy="34" r="4" fill="#3ecf8e"/>
  <circle cx="32" cy="34" r="7.4" fill="#3ecf8e" opacity=".22"/>
  <!-- base / piso -->
  <line x1="22" y1="46" x2="42" y2="46" stroke="#ecd175" stroke-width="2.4" stroke-linecap="round" opacity=".7"/>
</svg>
